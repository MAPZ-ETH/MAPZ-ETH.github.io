<!-- Event Highlights Carousel — reads from _data/highlights.yml -->
<div class="carousel-container">
    <div class="carousel-wrapper">
        {% for item in site.data.highlights.body %}
        <div class="carousel-item">
            <img src="{{ item.photo }}" alt="{{ item.title }}">
            <div class="carousel-caption">
                <h4>{{ item.title }}</h4>
                <p>{{ item.caption }}</p>
            </div>
        </div>
        {% endfor %}
    </div>

    <button class="carousel-btn carousel-prev" onclick="moveCarousel(-1)">❮</button>
    <button class="carousel-btn carousel-next" onclick="moveCarousel(1)">❯</button>

    <div class="carousel-dots">
        {% for item in site.data.highlights.body %}
        <span class="dot" onclick="currentSlide({{ forloop.index }})"></span>
        {% endfor %}
    </div>
</div>
