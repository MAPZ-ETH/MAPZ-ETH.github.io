<!-- Team Grid — reads from _data/team.yml -->
<div class="ab-team-grid">
    {% for member in site.data.team.body %}
    <div class="ab-team-card">
        <div class="ab-team-img">
            {% if member.linkedin %}
            <a href="{{ member.linkedin }}" target="_blank" rel="noopener noreferrer" class="ab-team-link" aria-label="LinkedIn profile of {{ member.name }}">
                <div class="ab-team-linkedin-badge" title="View LinkedIn Profile">
                    <i class="fab fa-linkedin-in"></i>
                </div>
            {% endif %}
                <img src="{{ member.photo }}" alt="{{ member.name }}">
            {% if member.linkedin %}
            </a>
            {% endif %}
        </div>
        <div class="ab-team-info">
            <h4>{{ member.name }}</h4>
            <span class="ab-team-role">{{ member.role }}</span>
        </div>
    </div>
    {% endfor %}
</div>
